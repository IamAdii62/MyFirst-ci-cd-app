name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t aditi62/myfirstcicd:latest .

      - name: Push Docker Image
        run: docker push aditi62/myfirstcicd:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
          docker stop $(docker ps -q) || true
          docker rm $(docker ps -aq) || true

          docker pull aditi62/myfirstcicd:latest

          docker run -d -p 4000:3000 \
            --network myfirst-ci-cd-app_default \
             -e BACKEND_URL=http://backend:5000 \
            --name app aditi62/myfirstcicd:latest


            