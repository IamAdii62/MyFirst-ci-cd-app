apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: myapp:v1
        ports:
        - containerPort: 3000

        env:
        - name: BACKEND_URL
          value: "http://backend-service:5000"

        resources:
          requests:
            cpu: "200m"
          limits:
            cpu: "500m"
